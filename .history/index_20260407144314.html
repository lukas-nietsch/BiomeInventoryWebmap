<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biome Inventory Webmap</title>
  <link rel="icon" type="image/x-icon" href="https://www.blaupause.uni-bayreuth.de/favicon.ico">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.22.0/dist/maplibre-gl.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <header class="sidebar-header">
        <h1>Biome Inventory</h1>
        <p>Interactive globe view of the biome classifications standardized by Fischer et al., 2022.</p>
      </header>

      <section class="panel">
        <h2>Layer Selection</h2>
        <label for="layerSelect">Publication</label>
        <select id="layerSelect" aria-label="Select biome layer"></select>
      </section>

      <section class="panel">
        <h2>Legend</h2>
        <div id="legend" class="legend-list"></div>
      </section>

      <section class="panel">
        <h2>Metadata</h2>
        <div id="metadata" class="metadata-table-wrap"></div>
      </section>
    </aside>

    <main class="map-area">
      <div id="map"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/geotiff"></script>
  <script src="https://unpkg.com/maplibre-gl@5.22.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/@geomatico/maplibre-cog-protocol@0.8.0/dist/index.js"></script>
  <script src="./app.js"></script>
</body>
</html>
